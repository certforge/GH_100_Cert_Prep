name: Link Check

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
  pull_request:
    branches:
      - main
    paths:
      - '**.md'
  schedule:
    # Run weekly on Sundays at 6am UTC to catch externally broken links
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Allow manual trigger for ad-hoc checks

# Minimal permissions — this workflow only reads repository content
permissions:
  contents: read

jobs:
  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore link check cache
        uses: actions/cache@v4
        with:
          path: .cache/lychee
          key: lychee-cache-${{ github.run_id }}
          restore-keys: |
            lychee-cache-

      - name: Run Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all markdown files
          args: >
            --verbose
            --no-progress
            --timeout 30
            --retry-wait-time 5
            --max-retries 3
            --exclude-loopback
            --exclude-private
            --exclude-link-local
            --cache
            --max-cache-age 1d
            '**/*.md'
          # Do not fail on external link errors (some links may be temporarily down)
          # Change to 'true' if you want strict external link enforcement
          fail: false
        env:
          # GitHub token to avoid rate limiting when checking github.com links
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on broken links (scheduled run only)
        if: >
          failure() &&
          github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link Check: Broken links detected'
          content-filepath: ./lychee/out.md
          labels: |
            documentation
            link-rot
            automated

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: ./lychee/out.md
          retention-days: 7
          if-no-files-found: ignore
